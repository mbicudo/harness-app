apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-app
  labels:
    app: harness-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: harness-app
  template:
    metadata:
      labels:
        app: harness-app
    spec:
      containers:
        - name: harness-app
          # Use your Docker Hub image, e.g. YOUR_DOCKERHUB_USER/harness-app:latest
          # For Minikube with local image: harness-app:latest and imagePullPolicy: IfNotPresent
          image: harness-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
